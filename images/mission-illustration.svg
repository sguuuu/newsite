<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Миссия проекта — объединение участников, педагогов и экспертов">

  <!-- Background -->
  <rect width="640" height="400" rx="20" fill="#EFF6FF"/>

  <!-- Soft blob backdrop -->
  <ellipse cx="320" cy="200" rx="270" ry="185" fill="#DBEAFE" opacity="0.3"/>

  <!-- ─── Connection lines (behind circles) ─────────────────────── -->
  <!-- star → student -->
  <line x1="248" y1="148" x2="155" y2="248"
        stroke="#BFDBFE" stroke-width="2.5" stroke-dasharray="9,6"/>
  <!-- star → teacher -->
  <line x1="320" y1="158" x2="320" y2="248"
        stroke="#BFDBFE" stroke-width="2.5" stroke-dasharray="9,6"/>
  <!-- star → expert -->
  <line x1="392" y1="148" x2="485" y2="248"
        stroke="#BFDBFE" stroke-width="2.5" stroke-dasharray="9,6"/>
  <!-- student ↔ teacher -->
  <line x1="218" y1="295" x2="272" y2="295"
        stroke="#BFDBFE" stroke-width="2" stroke-dasharray="6,5"/>
  <!-- teacher ↔ expert -->
  <line x1="368" y1="295" x2="422" y2="295"
        stroke="#BFDBFE" stroke-width="2" stroke-dasharray="6,5"/>

  <!-- ─── Central star badge ────────────────────────────────────── -->
  <g transform="translate(320, 108)">
    <!-- outer glow ring -->
    <circle r="62" fill="#FEF9C3" opacity="0.6"/>
    <!-- main circle -->
    <circle r="52" fill="#FCD34D"/>
    <!-- inner ring -->
    <circle r="44" fill="#F59E0B"/>
    <!-- 5-point star -->
    <polygon
      points="0,-28 8.5,-10 28,-10 14,2 19,22 0,12 -19,22 -14,2 -28,-10 -8.5,-10"
      fill="#FEF9C3"/>
    <!-- small top label dots (mimicking text) -->
    <rect x="-24" y="60" width="48" height="7" rx="3.5" fill="#FCD34D"/>
  </g>

  <!-- ─── Person: Участник (left) ──────────────────────────────── -->
  <g transform="translate(155, 295)">
    <!-- outer glow -->
    <circle r="68" fill="#EFF6FF" opacity="0.6"/>
    <!-- main circle -->
    <circle r="58" fill="#2563EB"/>
    <!-- head -->
    <circle cx="0" cy="-18" r="18" fill="white" opacity="0.92"/>
    <!-- body arc -->
    <ellipse cx="0" cy="22" rx="26" ry="18" fill="white" opacity="0.92"/>
    <!-- label -->
    <text y="88" text-anchor="middle"
          font-size="14" font-weight="700" fill="#1E40AF"
          font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif">
      Участник
    </text>
  </g>

  <!-- ─── Person: Педагог (center) ─────────────────────────────── -->
  <g transform="translate(320, 295)">
    <circle r="68" fill="#EFF6FF" opacity="0.6"/>
    <circle r="58" fill="#7C3AED"/>
    <circle cx="0" cy="-18" r="18" fill="white" opacity="0.92"/>
    <ellipse cx="0" cy="22" rx="26" ry="18" fill="white" opacity="0.92"/>
    <text y="88" text-anchor="middle"
          font-size="14" font-weight="700" fill="#5B21B6"
          font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif">
      Педагог
    </text>
  </g>

  <!-- ─── Person: Эксперт (right) ──────────────────────────────── -->
  <g transform="translate(485, 295)">
    <circle r="68" fill="#EFF6FF" opacity="0.6"/>
    <circle r="58" fill="#0891B2"/>
    <circle cx="0" cy="-18" r="18" fill="white" opacity="0.92"/>
    <ellipse cx="0" cy="22" rx="26" ry="18" fill="white" opacity="0.92"/>
    <text y="88" text-anchor="middle"
          font-size="14" font-weight="700" fill="#0E7490"
          font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif">
      Эксперт
    </text>
  </g>

  <!-- ─── Diploma card (top-left corner) ─────────────────────────── -->
  <g transform="translate(82, 105)">
    <rect x="-34" y="-28" width="68" height="54" rx="7"
          fill="white" stroke="#2563EB" stroke-width="2"/>
    <rect x="-24" y="-18" width="48" height="5" rx="2.5" fill="#DBEAFE"/>
    <rect x="-24" y="-8"  width="48" height="5" rx="2.5" fill="#DBEAFE"/>
    <rect x="-24" y="2"   width="32" height="5" rx="2.5" fill="#DBEAFE"/>
    <!-- seal -->
    <circle cx="16" cy="16" r="9" fill="#2563EB"/>
    <polyline points="12,16 15,20 21,12"
              fill="none" stroke="white"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ─── Coin (top-right corner) ──────────────────────────────── -->
  <g transform="translate(558, 105)">
    <circle r="32" fill="#FEF3C7"/>
    <circle r="26" fill="#F59E0B"/>
    <circle r="18" fill="none" stroke="#D97706" stroke-width="2"/>
    <polygon
      points="0,-10 3,-4 10,-4 5,0 7,8 0,4 -7,8 -5,0 -10,-4 -3,-4"
      fill="#FEF9C3"/>
  </g>

  <!-- ─── Decorative dots ───────────────────────────────────────── -->
  <circle cx="42"  cy="200" r="7" fill="#BFDBFE" opacity="0.7"/>
  <circle cx="598" cy="195" r="6" fill="#BFDBFE" opacity="0.7"/>
  <circle cx="42"  cy="310" r="5" fill="#BFDBFE" opacity="0.5"/>
  <circle cx="600" cy="315" r="5" fill="#BFDBFE" opacity="0.5"/>
  <circle cx="320" cy="375" r="6" fill="#BFDBFE" opacity="0.5"/>
  <circle cx="55"  cy="55"  r="5" fill="#FCD34D" opacity="0.5"/>
  <circle cx="585" cy="55"  r="5" fill="#FCD34D" opacity="0.5"/>
</svg>
