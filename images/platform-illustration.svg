<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Платформа финансового образования">
  <!-- Background -->
  <rect width="640" height="400" rx="20" fill="#EFF6FF"/>

  <!-- Soft decorative blobs -->
  <circle cx="520" cy="70"  r="130" fill="#DBEAFE" opacity="0.45"/>
  <circle cx="100" cy="350" r="100" fill="#DBEAFE" opacity="0.35"/>

  <!-- ─── Chart card ─────────────────────────────────────────────── -->
  <rect x="50" y="55" width="360" height="270" rx="16" fill="white"
        filter="url(#shadow)"/>

  <!-- chart grid -->
  <line x1="90" y1="95"  x2="390" y2="95"  stroke="#E0EAFF" stroke-width="1"/>
  <line x1="90" y1="125" x2="390" y2="125" stroke="#E0EAFF" stroke-width="1"/>
  <line x1="90" y1="155" x2="390" y2="155" stroke="#E0EAFF" stroke-width="1"/>
  <line x1="90" y1="185" x2="390" y2="185" stroke="#E0EAFF" stroke-width="1"/>
  <line x1="90" y1="215" x2="390" y2="215" stroke="#E0EAFF" stroke-width="1"/>
  <line x1="90" y1="245" x2="390" y2="245" stroke="#E0EAFF" stroke-width="1"/>

  <!-- chart bars — ascending with slight dip for realism -->
  <rect x="100" y="215" width="36" height="30"  rx="5" fill="#93C5FD"/>
  <rect x="148" y="195" width="36" height="50"  rx="5" fill="#60A5FA"/>
  <rect x="196" y="175" width="36" height="70"  rx="5" fill="#3B82F6"/>
  <rect x="244" y="155" width="36" height="90"  rx="5" fill="#2563EB"/>
  <rect x="292" y="170" width="36" height="75"  rx="5" fill="#3B82F6"/>
  <rect x="340" y="128" width="36" height="117" rx="5" fill="#1D4ED8"/>

  <!-- trend line -->
  <polyline
    points="118,212 166,192 214,172 262,152 310,167 358,125"
    fill="none" stroke="#F59E0B" stroke-width="3"
    stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="358" cy="125" r="6" fill="#F59E0B"/>
  <circle cx="118" cy="212" r="4" fill="#F59E0B" opacity="0.5"/>

  <!-- card title lines (mimicking text) -->
  <rect x="90" y="272" width="110" height="7" rx="3.5" fill="#DBEAFE"/>
  <rect x="90" y="286" width="75"  height="5" rx="2.5" fill="#EFF6FF"/>

  <!-- legend -->
  <circle cx="230" cy="276" r="5" fill="#2563EB"/>
  <rect x="240" y="272" width="55" height="6" rx="3" fill="#DBEAFE"/>
  <circle cx="230" cy="290" r="5" fill="#F59E0B"/>
  <rect x="240" y="286" width="42" height="6" rx="3" fill="#EFF6FF"/>

  <!-- ─── Graduation cap (top-right) ───────────────────────────── -->
  <g transform="translate(498, 108)">
    <!-- board -->
    <rect x="-40" y="-8" width="80" height="16" rx="7" fill="#0A2463"/>
    <!-- diamond -->
    <polygon points="0,-32 42,-8 0,16 -42,-8" fill="#0A2463"/>
    <!-- tassel string -->
    <line x1="42" y1="-8" x2="42" y2="28"
          stroke="#0A2463" stroke-width="3" stroke-linecap="round"/>
    <!-- tassel ball -->
    <circle cx="42" cy="32" r="8" fill="#F59E0B"/>
    <!-- tassel fringe -->
    <line x1="37" y1="40" x2="35" y2="54"
          stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="42" y1="40" x2="42" y2="56"
          stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="47" y1="40" x2="49" y2="54"
          stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- ─── Book (right middle) ──────────────────────────────────── -->
  <g transform="translate(498, 230)">
    <!-- back cover -->
    <rect x="-34" y="-52" width="66" height="90" rx="6" fill="#1E40AF"/>
    <!-- pages block -->
    <rect x="-27" y="-46" width="54" height="78" rx="4" fill="white"/>
    <!-- spine -->
    <rect x="-34" y="-52" width="10" height="90" rx="4" fill="#1E3A8A"/>
    <!-- page lines -->
    <rect x="-20" y="-34" width="38" height="5" rx="2.5" fill="#DBEAFE"/>
    <rect x="-20" y="-23" width="38" height="5" rx="2.5" fill="#DBEAFE"/>
    <rect x="-20" y="-12" width="38" height="5" rx="2.5" fill="#DBEAFE"/>
    <rect x="-20" y="-1"  width="26" height="5" rx="2.5" fill="#DBEAFE"/>
    <rect x="-20" y="10"  width="32" height="5" rx="2.5" fill="#DBEAFE"/>
    <!-- bookmark -->
    <polygon points="-11,36 -11,26 -3,31" fill="#F59E0B"/>
  </g>

  <!-- ─── Gold coin (bottom-right) ─────────────────────────────── -->
  <g transform="translate(540, 340)">
    <!-- shadow/depth -->
    <circle r="42" fill="#FEF3C7"/>
    <!-- main face -->
    <circle r="36" fill="#F59E0B"/>
    <!-- inner ring -->
    <circle r="27" fill="none" stroke="#D97706" stroke-width="2.5"/>
    <!-- 5-point star inside -->
    <polygon
      points="0,-18 5.5,-7 18,-7 8.5,1 12,14 0,7 -12,14 -8.5,1 -18,-7 -5.5,-7"
      fill="#FEF9C3"/>
  </g>

  <!-- ─── Green growth badge ────────────────────────────────────── -->
  <g transform="translate(440, 188)">
    <rect x="-28" y="-20" width="56" height="40" rx="10" fill="#10B981"/>
    <!-- up-arrow -->
    <polygon points="0,-10 8,2 4,2 4,12 -4,12 -4,2 -8,2" fill="white"/>
  </g>

  <!-- ─── Drop shadow filter ───────────────────────────────────── -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8"
                    flood-color="#1E3A8A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- ─── Decorative dots ──────────────────────────────────────── -->
  <circle cx="45"  cy="130" r="7" fill="#BFDBFE" opacity="0.7"/>
  <circle cx="600" cy="200" r="6" fill="#BFDBFE" opacity="0.6"/>
  <circle cx="45"  cy="290" r="5" fill="#BFDBFE" opacity="0.5"/>
  <circle cx="430" cy="372" r="8" fill="#BFDBFE" opacity="0.5"/>
  <circle cx="580" cy="80"  r="5" fill="#FCD34D" opacity="0.6"/>
  <circle cx="60"  cy="65"  r="4" fill="#FCD34D" opacity="0.5"/>
</svg>
