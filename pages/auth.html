<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация - Школа финансовой культуры</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            background: var(--gradient-hero);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .auth-box {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
        }
        
        .auth-tabs {
            display: flex;
            background: var(--light-gray);
        }
        
        .auth-tab {
            flex: 1;
            padding: 20px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            background: transparent;
            color: var(--text-gray);
        }
        
        .auth-tab.active {
            background: white;
            color: var(--primary-dark);
        }
        
        .auth-content {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--light-gray);
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary-blue);
        }
        
        .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--light-gray);
            border-radius: 10px;
            font-size: 15px;
            background: white;
        }
        
        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-checkbox input {
            width: 18px;
            height: 18px;
        }
        
        .auth-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .auth-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.3);
        }
        
        .auth-link {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 500;
        }
        
        .auth-link:hover {
            text-decoration: underline;
        }
        
        .auth-divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }
        
        .auth-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--light-gray);
        }
        
        .auth-divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            color: var(--text-gray);
            font-size: 14px;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Вход</button>
                <button class="auth-tab" onclick="switchTab('register')">Регистрация</button>
            </div>
            
            <!-- Login Form -->
            <div id="login-content" class="tab-content active">
                <div class="auth-content">
                    <h2 style="text-align: center; color: var(--primary-dark); margin-bottom: 10px;">Добро пожаловать!</h2>
                    <p style="text-align: center; color: var(--text-gray); margin-bottom: 30px;">Войдите в свой аккаунт</p>
                    
                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-input" required placeholder="example@email.com">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Пароль</label>
                            <input type="password" class="form-input" required placeholder="Введите пароль">
                        </div>
                        
                        <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                            <div class="form-checkbox">
                                <input type="checkbox" id="remember">
                                <label for="remember" style="margin: 0; font-size: 14px; color: var(--text-gray);">Запомнить меня</label>
                            </div>
                            <a href="#" class="auth-link" style="font-size: 14px;">Забыли пароль?</a>
                        </div>
                        
                        <button type="submit" class="auth-submit">Войти</button>
                    </form>
                    
                    <div class="auth-divider">
                        <span>или</span>
                    </div>
                    
                    <p style="text-align: center; color: var(--text-gray); font-size: 14px;">
                        Нет аккаунта? <a href="#" class="auth-link" onclick="switchTab('register'); return false;">Зарегистрироваться</a>
                    </p>
                </div>
            </div>
            
            <!-- Register Form -->
            <div id="register-content" class="tab-content">
                <div class="auth-content">
                    <h2 style="text-align: center; color: var(--primary-dark); margin-bottom: 10px;">Создать аккаунт</h2>
                    <p style="text-align: center; color: var(--text-gray); margin-bottom: 30px;">Присоединяйтесь к нам!</p>
                    
                    <form id="registerForm" onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label class="form-label">Тип пользователя</label>
                            <select class="form-select" required id="userType" onchange="toggleTeacherFields()">
                                <option value="">Выберите тип</option>
                                <option value="student">Участник (школьник/студент)</option>
                                <option value="teacher">Педагог (куратор)</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Фамилия Имя Отчество</label>
                            <input type="text" class="form-input" required placeholder="Иванов Иван Иванович">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-input" required placeholder="example@email.com">
                        </div>
                        
                        <div class="form-group" id="organizationField" style="display: none;">
                            <label class="form-label">Учебное заведение</label>
                            <input type="text" class="form-input" placeholder="Название школы/вуза">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Пароль</label>
                            <input type="password" class="form-input" required placeholder="Минимум 8 символов">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Подтвердите пароль</label>
                            <input type="password" class="form-input" required placeholder="Повторите пароль">
                        </div>
                        
                        <div class="form-group">
                            <div class="form-checkbox">
                                <input type="checkbox" id="agreement" required>
                                <label for="agreement" style="margin: 0; font-size: 13px; color: var(--text-gray);">
                                    Я согласен с <a href="documents.html" class="auth-link">политикой конфиденциальности</a> и <a href="documents.html" class="auth-link">пользовательским соглашением</a>
                                </label>
                            </div>
                        </div>
                        
                        <button type="submit" class="auth-submit">Зарегистрироваться</button>
                    </form>
                    
                    <div class="auth-divider">
                        <span>или</span>
                    </div>
                    
                    <p style="text-align: center; color: var(--text-gray); font-size: 14px;">
                        Уже есть аккаунт? <a href="#" class="auth-link" onclick="switchTab('login'); return false;">Войти</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
    
    <div style="position: absolute; top: 20px; left: 20px;">
        <a href="../index.html" style="display: flex; align-items: center; gap: 10px; color: white; text-decoration: none; font-weight: 500;">
            <span style="font-size: 24px;">←</span> На главную
        </a>
    </div>

    <script src="../js/script.js"></script>
    <script>
        function switchTab(tab) {
            // Update tabs
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('login-content').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('register-content').classList.add('active');
            }
        }
        
        function toggleTeacherFields() {
            const userType = document.getElementById('userType').value;
            const orgField = document.getElementById('organizationField');
            
            if (userType === 'teacher' || userType === 'student') {
                orgField.style.display = 'block';
                orgField.querySelector('input').required = true;
            } else {
                orgField.style.display = 'none';
                orgField.querySelector('input').required = false;
            }
        }
        
        function handleLogin(e) {
            e.preventDefault();
            
            // Simulate login
            showNotification('Вход выполнен успешно!', 'success');
            
            // Redirect based on URL parameter or to index
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect');
            
            setTimeout(() => {
                window.location.href = redirect || '../index.html';
            }, 1000);
        }
        
        function handleRegister(e) {
            e.preventDefault();
            
            const form = e.target;
            const password = form.querySelectorAll('input[type="password"]')[0].value;
            const confirmPassword = form.querySelectorAll('input[type="password"]')[1].value;
            
            if (password !== confirmPassword) {
                showNotification('Пароли не совпадают!', 'error');
                return;
            }
            
            if (password.length < 8) {
                showNotification('Пароль должен содержать минимум 8 символов!', 'error');
                return;
            }
            
            // Simulate registration
            showNotification('Регистрация успешна! Проверьте email для подтверждения.', 'success');
            
            setTimeout(() => {
                switchTab('login');
            }, 2000);
        }
    </script>
</body>
</html>
